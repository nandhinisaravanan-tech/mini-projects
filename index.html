<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreyAtom Logistics - Delivery Exceptions</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <div>
            <h1>GreyAtom Logistics</h1>
        </div>
        
        <div class="stats">
            <div class="card">
                <h3 class="text-size">Open</h3>
                <p id="openCount">0</p>
            </div>

            <div class="card">
                <h3 class="text-size">Resolved</h3>
                <p id="resolvedCount">0</p>
            </div>
        </div>
    </header>

    <div class="container">

        

        <section class="form-section">

            <h2>Report Delivery Exception</h2>

            <form id="exceptionForm">

                <div class="form-group">
                    <label for="deliveryId">Delivery ID *</label>
                    <input type="text" id="deliveryId" title="Delivery ID">
                </div>

                <div class="form-group">
                    <label for="customerName">Customer Name *</label>
                    <input type="text" id="customerName" title="Customer Name">
                </div>

                <div class="form-group">
                    <label for="issueType">Issue Type *</label>
                    <select id="issueType" title="Issue Type">
                        <option value="">Select Issue</option>
                        <option>Address Not Found</option>
                        <option>Customer Not Available</option>
                        <option>Payment Issue</option>
                        <option>Package Damaged</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Priority *</label>
                    <div class="priority-options">
                        <label><input type="radio" name="priority" value="Low"> Low</label>
                        <label><input type="radio" name="priority" value="Medium"> Medium</label>
                        <label><input type="radio" name="priority" value="High"> High</label>
                    </div>

                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" title="Notes"></textarea>
                </div>

                <button type="submit">Submit Issue</button>

            </form>
        </section>

            

        <section class="content-section">
            <div class="filters">


                <select id="filterIssue" title="Filter by issue type">
                    <option value="All">All Issue Types</option>
                    <option>Address Not Found</option>
                    <option>Customer Not Available</option>
                    <option>Payment Issue</option>
                    <option>Package Damaged</option>
                </select>

                <select id="filterStatus" title="Filter by status">
                    <option value="All">All Status</option>
                    <option>Open</option>
                    <option>Resolved</option>
                </select>

            </div>

            <table class="table-section">

                <thead>
                    <tr>
                        <th>Delivery ID</th>
                        <th>Customer</th>
                        <th>Issue</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="exceptionTable"></tbody>

            </table>

        </section>

        

    </div>

<script src="script.js"></script>

</body>
</html>
